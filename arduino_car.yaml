# YOLOv8 dataset configuration
# Project : ArduinoCar detection on DJI Tello drone stream
# Source  : Roboflow export – arduino-object-target (COCO format)
# Images  : 96 PNG (3024×4032 px), train split only

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
path: /home/ale/drone_detection_rm/datasetTest1/drone_vision.v3i.yolov8  # dataset root

train: train/images   # 66 images + train/labels/
val: valid/images   # 22 images + valid/labels/

# ---------------------------------------------------------------------------
# Classes
# ---------------------------------------------------------------------------
nc: 1          # ArduinoCar is the only annotated object (all 96 bboxes).
               # "objects" (id 0 in the COCO JSON) is a supercategory with no
               # direct annotations and is excluded here.
names:
  0: ArduinoCar3

# ---------------------------------------------------------------------------
# Training example
# ---------------------------------------------------------------------------
# yolo detect train \
#     data=arduino_car.yaml \
#     model=yolov8n.pt \
#     epochs=100 \
#     imgsz=640 \
#     batch=16
#
# Once training is done, update tello_yolo_detect.py:
#     model_path = "runs/detect/train/weights/best.pt"
#     target_classes = ["ArduinoCar"]
